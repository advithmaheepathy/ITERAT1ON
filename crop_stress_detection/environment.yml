name: crop_stress
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - gdal=3.6.4              # rasterio dependency, must be conda-managed
  - libgdal=3.6.4
  - proj=9.2.0
  - geos=3.11.2
  - pip:
    - rasterio==1.3.9         # GeoTIFF I/O, requires GDAL
    - numpy==1.24.4           # array operations
    - pyproj==3.6.1           # CRS transformations
    - shapely==2.0.3          # geometry for tile bounding boxes
    - sentinelsat==1.2.1      # Copernicus OpenSearch API download
    - requests==2.31.0        # HTTP for OData API
    - pyyaml==6.0.1           # config file parsing
    - tqdm==4.66.1            # progress bars
    - click==8.1.7            # CLI argument parsing
    # Optional: Google Earth Engine alternative
    # - earthengine-api==0.1.380
    # Optional: TerraMind / Prithvi (see TERRAMIND_NOTE.md)
    # - transformers==4.40.0
    # - timm==0.9.16
    # - einops==0.7.0
    # - torch==2.1.2  (install separately with CUDA support)