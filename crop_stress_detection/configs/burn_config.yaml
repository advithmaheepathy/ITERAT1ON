# Burn Detection Pipeline Configuration
# All thresholds documented with references.

# --- Sentinel-2 Band Mapping ---
sentinel2:
  band_red:  "B04"       # 10m resolution
  band_nir:  "B08"       # 10m resolution
  band_swir: "B12"       # 20m resolution (resampled to 10m)
  band_scl:  "SCL"       # 20m resolution (resampled to 10m, nearest neighbor)
  resolution: 10         # meters per pixel for B04/B08
  nodata_value: 0
  reflectance_scale: 10000

# --- Cloud Mask ---
# SCL classes masked as invalid (unusable):
#   0  = NO_DATA
#   1  = SATURATED_OR_DEFECTIVE
#   3  = CLOUD_SHADOWS
#   8  = CLOUD_MEDIUM_PROBABILITY
#   9  = CLOUD_HIGH_PROBABILITY
#   10 = THIN_CIRRUS
#   11 = SNOW_ICE
# Additionally:
#   6  = WATER (excluded from burn analysis)
cloud_mask:
  unusable_scl_classes: [0, 1, 3, 8, 9, 10, 11]
  water_scl_class: 6

# --- Vegetation Filter ---
# Only pixels with pre-fire NDVI above this threshold are considered
# for burn analysis. Prevents false positives on bare soil, urban, etc.
# Source: standard agronomy threshold for active vegetation
vegetation_filter:
  ndvi_min: 0.3

# --- dNBR Burn Detection ---
# Pixel is classified as burned when:
#   dNBR > burn_threshold  AND  NDVI_before > ndvi_min
burn_detection:
  dnbr_threshold: 0.3

# --- Burn Severity Thresholds ---
# Source: USGS / Key & Benson (2006), FIREMON protocol
# dNBR ranges:
#   < 0.1   → Unburned (or regrowth)
#   0.1–0.3 → Low severity burn
#   0.3–0.6 → Moderate severity burn
#   > 0.6   → Severe / high severity burn
severity:
  unburned_max: 0.1
  low_max: 0.3
  moderate_max: 0.6
  # Anything above moderate_max is classified as "severe"

# --- Area Calculation ---
# At 10m resolution: 1 pixel = 10m × 10m = 100 m² = 0.01 hectares
area:
  pixel_resolution_m: 10
  pixel_area_ha: 0.01

# --- Output ---
output:
  coordinate_precision: 6
  timestamp_format: "iso8601"
