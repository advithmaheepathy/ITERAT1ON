# =============================================================================
# Pipeline Configuration  — v3.0.0  (Physically Correct, Zero Bias)
# =============================================================================

# --- Sentinel-2 Source ---
sentinel2:
  band_red: "B04"           # 10m  (~665 nm)
  band_nir: "B08"           # 10m  (~842 nm)
  band_scl: "SCL"           # 20m  → resampled to 10m internally
  resolution_m: 10
  reflectance_scale: 10000  # DN → surface reflectance: value / 10000

# --- Masking ---
# ROOT CAUSE FIX: Water (SCL=6) was masking 76% of this coastal tile.
# Water is NOT a bad pixel — it has valid, physically correct NDVI values.
# Keep water pixels; classify them separately via NDVI < 0.0 threshold.
masking:
  mask_clouds: true
  mask_water: false          # ← CHANGED from true. Set true only for inland-only AOIs.
  scl_cloud_classes: [0, 1, 3, 8, 9, 10, 11]  # these are genuinely unusable
  # SCL class 2 (DARK_AREA) — kept; it is valid data (dark soil, shadow edges)

# --- NDVI Computation ---
ndvi:
  valid_range_min: -1.0     # physically correct lower bound
  valid_range_max:  1.0     # physically correct upper bound
  apply_smoothing: false    # off by default; preserves data
  smoothing_sigma: 1.0

# --- NDVI Classification Thresholds ---
# Physically realistic, 6-class scheme. NO stress bias.
# Based on Rouse et al. 1974, ESA Sentinel-2 docs, USDA NASS studies.
classification:
  min_valid_pixel_fraction: 0.10   # below this → "insufficient_data"

  # 6-class NDVI scheme:
  water_nonveg_max:    0.0    # NDVI < 0.0    → water / non-vegetation
  bare_soil_max:       0.15   # 0.0 – 0.15    → bare soil
  sparse_stressed_max: 0.30   # 0.15 – 0.30   → sparse / stressed vegetation
  moderate_veg_max:    0.50   # 0.30 – 0.50   → moderate vegetation
  healthy_veg_max:     0.70   # 0.50 – 0.70   → healthy vegetation
  # NDVI >= 0.70                              → dense vegetation

# --- Tiling ---
tile_size_km: 5.0

# --- Alert Generation ---
# Alert ONLY when tile shows genuine agricultural stress.
# With 76% ocean, most tiles will be ocean — do not alert on those.
alerts:
  alert_classes:
    - "sparse_stressed"    # 0.15–0.30 NDVI means likely fire/drought damage
  min_valid_pixel_fraction: 0.30   # ignore tiles with <30% valid data
  min_stressed_fraction:    0.50   # ≥50% of valid pixels must be stressed class

# --- Area Calculation ---
area:
  pixel_area_m2: 100        # 10m × 10m
  m2_per_ha: 10000

# --- Output ---
output:
  coordinate_precision: 6
  include_tile_pixel_breakdown: true